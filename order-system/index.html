<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>勇者鬥惡龍：美食大冒險</title>
    <style>
      /* 💡 載入 LanaPixel 像素字體 */
      @font-face {
        font-family: 'LanaPixel';
        src: url('https://cdn.jsdelivr.net/gh/ericoporto/pixel-utf8-fonts@main/lanapixel/LanaPixel.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }

      /* 💡 將網頁預設字體改為 LanaPixel */
      body { 
        font-family: 'LanaPixel', 'PingFang TC', sans-serif; 
        margin: 0; 
        padding: 0; 
        background-color: #FAF4F2; 
        color: #333; 
        overflow-x: hidden; 
      }
      * { box-sizing: border-box; }
      .pixel-box { background-color: #ffffff; border: 4px solid #6F1D1B; box-shadow: 4px 4px 0px #000; border-radius: 2px; }
      
      /* 💡 將所有按鈕字體改為 LanaPixel */
      .pixel-btn { 
        font-family: 'LanaPixel', sans-serif; 
        background-color: #6F1D1B; 
        color: white; 
        border: 4px solid #fff; 
        box-shadow: 4px 4px 0px #000; 
        padding: 12px 24px; 
        cursor: pointer; 
        text-transform: uppercase; 
        transition: transform 0.1s, box-shadow 0.1s; 
      }
      .pixel-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
